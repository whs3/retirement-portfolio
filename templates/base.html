<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Retirement Portfolio Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // Attach CSRF token to all state-changing fetch requests automatically
    (function () {
      const token = document.querySelector('meta[name="csrf-token"]').content;
      const _fetch = window.fetch;
      window.fetch = (url, opts = {}) => {
        const method = (opts.method || 'GET').toUpperCase();
        if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
          opts.headers = Object.assign({ 'X-CSRFToken': token }, opts.headers || {});
        }
        return _fetch(url, opts);
      };
    })();
  </script>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">RetireTrack (v1.0)</div>
  <ul class="nav-links">
    <li><a href="/"          {% if request.endpoint == 'dashboard'       %}class="active"{% endif %}>Dashboard</a></li>
    <li><a href="/performance" {% if request.endpoint == 'performance_page' %}class="active"{% endif %}>Performance</a></li>
    <li><a href="/lookup"    {% if request.endpoint == 'lookup_page'     %}class="active"{% endif %}>Price Lookup</a></li>
    <li><a href="/holdings"  {% if request.endpoint == 'holdings_page'   %}class="active"{% endif %}>Holdings</a></li>
    <li><a href="/overlap"   {% if request.endpoint == 'overlap_page'    %}class="active"{% endif %}>Overlap</a></li>
    <li><a href="/rebalance" {% if request.endpoint == 'rebalance_page'  %}class="active"{% endif %}>Rebalance</a></li>
    <li><a href="/audit"     {% if request.endpoint == 'audit_page'      %}class="active"{% endif %}>Audit Log</a></li>
    <li><a href="/api/export/csv" class="btn-nav-export">Export CSV</a></li>
  </ul>
</nav>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
